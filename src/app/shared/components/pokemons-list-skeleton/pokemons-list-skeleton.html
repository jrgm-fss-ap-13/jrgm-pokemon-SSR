<div class="grid grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 2xl:grid-cols-5 gap-3 sm:gap-4 md:gap-6">
  @for( pokemon of '123457890123456'.split(''); track $index ) {
    <div class="relative bg-surface-container-low rounded-xl p-3 sm:p-4 animate-pulse">
      <div class="flex justify-between items-start mb-6">
        <div class="w-10 h-8 bg-surface-container-highest rounded"></div>
        <div class="absolute top-3 right-3 sm:top-4 sm:right-4 flex flex-col items-end gap-1 z-20">
          <div class="w-12 h-3 bg-surface-container-highest rounded-full"></div>
          <div class="w-12 h-3 bg-surface-container-highest rounded-full"></div>
        </div>
      </div>
      <div class="relative h-28 w-full z-10">
        <div class="absolute -top-8 left-1/2 -translate-x-1/2 w-28 h-28 bg-surface-container-highest rounded-full drop-shadow-2xl"></div>
      </div>
      <div>
        <div class="h-6 w-24 bg-surface-container-highest rounded mt-2"></div>
      </div>
    </div>  
  }
</div>
