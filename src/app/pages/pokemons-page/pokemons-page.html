<!-- <main> is already handled in root layout or here. We will put <main> here because it is page content -->
<main class="mt-24 px-4 md:px-6 pb-12 mx-auto w-full">
  <!-- Hero Title Section -->
  <div class="mb-10 flex flex-col md:flex-row md:items-end justify-between gap-6">
    <div>
      <div class="flex items-center gap-1 sm:gap-2">
        <button 
        (click)="loadPokemons(-1)"
        [disabled]="currentPage() <= 1"
        class="w-8 h-8 sm:w-10 sm:h-10 flex items-center justify-center bg-surface-container-high hover:bg-surface-container-highest rounded-lg transition-colors disabled:opacity-50 disabled:cursor-not-allowed cursor-pointer">
          <span class="material-symbols-outlined text-[18px] sm:text-[24px]">chevron_left</span>
        </button>
        <div class="flex items-center gap-1 font-headline font-bold text-sm sm:text-base">
          @for (page of pagesArray(); track page) {
            <button 
              (click)="goToPage(page)"
              [class]="page === currentPage() ? 'w-8 h-8 sm:w-10 sm:h-10 bg-primary text-on-primary rounded-lg transition-colors cursor-pointer' : 'w-8 h-8 sm:w-10 sm:h-10 hover:bg-surface-container-high text-on-surface rounded-lg transition-colors px-1 sm:px-2 cursor-pointer'">
              {{ page }}
            </button>
          }
          
          @if (totalPages() > 3 && currentPage() < totalPages() - 2) {
            <span class="px-1 sm:px-2 text-on-surface-variant">...</span>
            <button 
              (click)="goToPage(totalPages())"
              class="w-8 h-8 sm:w-10 sm:h-10 hover:bg-surface-container-high text-on-surface rounded-lg transition-colors px-1 sm:px-2 cursor-pointer">
              {{ totalPages() }}
            </button>
          }
        </div>
        <button 
        (click)="loadPokemons(+1)"
        [disabled]="currentPage() >= totalPages()"
        class="w-8 h-8 sm:w-10 sm:h-10 flex items-center justify-center bg-surface-container-high hover:bg-surface-container-highest rounded-lg transition-colors disabled:opacity-50 disabled:cursor-not-allowed cursor-pointer">
          <span class="material-symbols-outlined text-[18px] sm:text-[24px]">chevron_right</span>
        </button>
      </div>
    </div>
    <!-- Type Filter Chips -->
    <div class="flex items-center gap-2 overflow-x-auto no-scrollbar pb-2 w-full md:w-auto">
      <button class="px-4 sm:px-5 py-1.5 sm:py-2 bg-primary text-on-primary font-label text-[10px] sm:text-xs tracking-widest uppercase rounded-full whitespace-nowrap">All Units</button>
      <button class="px-4 sm:px-5 py-1.5 sm:py-2 bg-surface-container-high hover:bg-surface-container-highest text-on-surface font-label text-[10px] sm:text-xs tracking-widest uppercase rounded-full whitespace-nowrap transition-colors">Fire</button>
      <button class="px-4 sm:px-5 py-1.5 sm:py-2 bg-surface-container-high hover:bg-surface-container-highest text-on-surface font-label text-[10px] sm:text-xs tracking-widest uppercase rounded-full whitespace-nowrap transition-colors">Water</button>
      <button class="px-4 sm:px-5 py-1.5 sm:py-2 bg-surface-container-high hover:bg-surface-container-highest text-on-surface font-label text-[10px] sm:text-xs tracking-widest uppercase rounded-full whitespace-nowrap transition-colors">Electric</button>
      <button class="px-4 sm:px-5 py-1.5 sm:py-2 bg-surface-container-high hover:bg-surface-container-highest text-on-surface font-label text-[10px] sm:text-xs tracking-widest uppercase rounded-full whitespace-nowrap transition-colors">Grass</button>
      <button class="px-4 sm:px-5 py-1.5 sm:py-2 bg-surface-container-high hover:bg-surface-container-highest text-on-surface font-label text-[10px] sm:text-xs tracking-widest uppercase rounded-full whitespace-nowrap transition-colors">Psychic</button>
    </div>
  </div>
  
  @if (isLoading()) {
    <app-pokemons-list-skeleton />
  } @else {
    <app-pokemons-list [pokemons]="pokemons()" />
  }

</main>
